# Partitioning defaults: present ZFS as the default root filesystem.
---
efiSystemPartition: "/boot/efi"
efiSystemPartitionSize: 512M
userSwapChoices:
  - none
  - small
  - suspend

drawNestedPartitions: false
alwaysShowPartitionLabels: true
defaultFileSystemType: "zfs"
availableFileSystemTypes: [ "zfs", "ext4", "btrfs", "xfs" ]
enableLuksAutomatedPartitioning: true

initialPartitioningChoice: erase
# Auto-allocate generous swap (>= RAM, hibernate-capable) on guided installs --
# the "2x RAM rule of thumb". Calamares presets are none/small/suspend/file;
# "suspend" is the most generous auto option.
initialSwapChoice: suspend
