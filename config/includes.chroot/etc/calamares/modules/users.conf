---
defaultGroups:
  - cdrom
  - floppy
  - sudo
  - audio
  - dip
  - video
  - plugdev
  - netdev
  - bluetooth
autologinGroup: autologin
doAutologin: false
sudoersGroup: sudo
setRootPassword: false
doReusePassword: false
availableShells: /bin/bash, /usr/bin/zsh
hostname:
  location: EtcFile
  writeHostsFile: true
