# ZFS pool/dataset creation for the installed system.
# Consumed by Calamares' `zfs` module (runs after `partition`, before `mount`).
---
# Root pool name. The installed system boots from rpool/ROOT/debian.
poolName: rpool

# Pool-wide properties tuned for a modern SSD desktop root.
poolOptions: "-f -o ashift=12 -o autotrim=on -O acltype=posixacl -O compression=lz4 -O dnodesize=auto -O normalization=formD -O relatime=on -O xattr=sa -O canmount=off -O mountpoint=/ -O devices=off"

# Native ZFS encryption. Disabled by default; flip to true to prompt for a
# passphrase (Plymouth's password callback already renders dots on the splash).
encrypt: false
# passphrase: ""
