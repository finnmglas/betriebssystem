# GRUB bootloader install. ZFS-on-root needs GRUB with ZFS support; the
# initramfs (zfs-initramfs) imports rpool and mounts rpool/ROOT/debian.
---
efiBootLoader: "grub"
kernel: "/vmlinuz"
img: "/initrd.img"
fallback: "/initrd.img"
timeout: "5"
bootloaderEntryName: "BETRIEBSSYSTEM"
efiBootloaderId: "BETRIEBSSYSTEM"
installEFIFallback: true
grubInstall: "grub-install"
grubMkconfig: "grub-mkconfig"
grubCfg: "/boot/grub/grub.cfg"
