# Waydroid needs the binder driver at boot. This kernel has binder_linux as a
# module with no BINDERFS, so it must be loaded (with the legacy device params in
# modprobe.d/waydroid.conf) to create /dev/binder, /dev/hwbinder, /dev/vndbinder.
# Harmless on the live medium (just loads a module); Waydroid itself only runs
# post-install.
binder_linux
